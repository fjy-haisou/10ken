

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>10-KEN 日常車両点検システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--mint:#4ECDC4;--mint-light:#A8EDEA;--mint-pale:#E8FAF9;--mint-dark:#2BB5AC;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--red:#FF6B6B;--shadow-sm:0 1px 3px #EEF2F7;--shadow-lg:0 12px 40px rgba(0,0,0,0.1);--radius:16px;--radius-sm:10px;--radius-xs:6px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:#EEF2F7;color:var(--gray-900);min-height:100vh;}
.app{max-width:860px;margin:0 auto;padding:0 20px 60px;}
.header{padding:24px 0 20px;display:flex;flex-direction:column;gap:10px;}
.system-title{font-family:'DM Sans',sans-serif;font-size:clamp(13px,2.1vw,18px);font-weight:200;color:var(--mint-dark);}
.page-title{padding:20px 28px 16px;border-radius:var(--radius-sm);background:linear-gradient(270deg,#4ECDC4,#2BB5AC,#45B7D1,#96CEB4,#88D8B0,#4ECDC4,#2BB5AC,#6EC6CA);background-size:400% 400%;animation:gradientShift 8s ease infinite;box-shadow:0 4px 20px rgba(78,205,196,0.35);display:flex;flex-direction:column;gap:12px;color:white;}
@keyframes gradientShift{0%{background-position:0% 50%}25%{background-position:100% 50%}50%{background-position:100% 0%}75%{background-position:0% 100%}100%{background-position:0% 50%}}
.pt-date-big{font-family:'Space Mono',monospace;font-size:clamp(36px,6vw,64px);font-weight:700;line-height:1;letter-spacing:-0.04em;mix-blend-mode:difference;}
.pt-day-weather-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.pt-date-sub{font-size:clamp(20px,3vw,28px);font-weight:700;font-family:'DM Sans',sans-serif;white-space:nowrap;mix-blend-mode:difference;}
.pt-weather{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pt-weather-icon{font-size:28px;}
.pt-weather-info{text-align:right;}
.pt-weather-temp{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;mix-blend-mode:difference;}
.pt-weather-desc{font-size:11px;margin-top:2px;font-family:'DM Sans',sans-serif;opacity:0.9;}
.pt-joke{border-top:1px solid rgba(255,255,255,0.25);padding-top:10px;}
.pt-joke-label{font-size:10px;font-family:'Space Mono',monospace;color:rgba(255,255,255,0.7);font-weight:700;letter-spacing:0.1em;display:block;margin-bottom:4px;}
.pt-joke-text{font-size:13px;color:rgba(255,255,255,0.92);font-style:italic;line-height:1.55;}
.nav-tabs{display:flex;gap:6px;margin-bottom:28px;background:var(--gray-100);padding:5px;border-radius:var(--radius-sm);}
.tab-btn{flex:1;padding:10px 8px;border:none;border-radius:var(--radius-xs);background:transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;color:var(--gray-500);transition:all 0.2s;}
.tab-btn.active{background:white;color:var(--gray-900);box-shadow:var(--shadow-sm);font-weight:700;}
.panel{display:none;}.panel.active{display:block;}
.steps{display:flex;align-items:center;margin-bottom:28px;overflow-x:auto;}
.step-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-400);font-weight:500;white-space:nowrap;}
.step-item.done{color:var(--mint-dark);font-weight:600;}
.step-item.active{color:var(--mint-dark);font-weight:800;font-size:15px;}
.step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--gray-300);color:var(--gray-400);flex-shrink:0;transition:all 0.3s;}
.step-item.done .step-circle{background:var(--mint);border-color:var(--mint);color:white;}
.step-item.active .step-circle{background:var(--mint-dark);border-color:var(--mint-dark);color:white;width:34px;height:34px;font-size:14px;box-shadow:0 0 0 4px rgba(78,205,196,0.18);}
.step-line{flex:1;height:2px;background:var(--gray-200);margin:0 8px;min-width:16px;}
.step-line.done{background:var(--mint);}
.card{background:white;border-radius:var(--radius);padding:24px;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:700;color:var(--gray-500);letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Sans',sans-serif;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--gray-100);}
.btn-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
.sel-btn{padding:14px 10px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);background:white;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;color:var(--gray-700);transition:all 0.18s;text-align:center;}
.sel-btn.selected{border-color:var(--mint);color:var(--mint-dark);background:var(--mint-pale);font-weight:700;}
.alcohol-row{background:linear-gradient(270deg,#4ECDC4,#2BB5AC,#45B7D1,#96CEB4,#88D8B0,#4ECDC4);background-size:400% 400%;animation:gradientShift 8s ease infinite;border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;}
.alcohol-label{font-size:13px;font-weight:700;color:white;margin-bottom:10px;}
.alcohol-value-input{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.alcohol-number{width:80px;padding:8px 12px;border:2px solid rgba(255,255,255,0.5);border-radius:var(--radius-xs);font-family:'Space Mono',monospace;font-size:18px;text-align:center;color:var(--gray-900);background:white;outline:none;}
.alcohol-unit{font-size:12px;color:rgba(255,255,255,0.85);}
.alcohol-result-btns{display:flex;gap:6px;}
.alc-result-btn{padding:8px 16px;border-radius:var(--radius-xs);border:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.2);cursor:pointer;font-size:14px;font-weight:600;color:white;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.alc-result-btn.pass.selected{background:white;border-color:white;color:var(--mint-dark);}
.alc-result-btn.fail.selected{background:var(--red);border-color:var(--red);color:white;}
.bulk-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:14px;border-radius:var(--radius-sm);background:linear-gradient(270deg,#4ECDC4,#2BB5AC,#45B7D1,#96CEB4,#88D8B0,#4ECDC4);background-size:400% 400%;animation:gradientShift 8s ease infinite;}
.bulk-btn{padding:8px 16px;border-radius:100px;border:1.5px solid white;background:rgba(255,255,255,0.2);cursor:pointer;font-size:12px;font-weight:600;color:white;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.bulk-btn.white{border-color:var(--gray-200);background:white;color:var(--gray-600);}
.bulk-btn.white:hover{border-color:var(--mint);color:var(--mint-dark);}
.inspection-grid{display:flex;flex-direction:column;gap:8px;padding:14px;border-radius:var(--radius-sm);background:linear-gradient(270deg,#4ECDC4,#2BB5AC,#45B7D1,#96CEB4,#88D8B0,#4ECDC4);background-size:400% 400%;animation:gradientShift 8s ease infinite;}
.inspect-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.88);border:1.5px solid transparent;transition:all 0.15s;}
.inspect-row.ok{background:rgba(78,205,196,0.15);border-color:rgba(78,205,196,0.4);}
.inspect-row.ng{background:rgba(255,107,107,0.15);border-color:rgba(255,107,107,0.4);}
.inspect-name{flex:1;font-size:14px;color:var(--gray-700);}
.ox-buttons{display:flex;gap:6px;}
.ox-btn{width:44px;height:36px;border-radius:var(--radius-xs);border:2px solid var(--gray-200);background:white;cursor:pointer;font-size:16px;font-weight:700;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.ox-btn.o-btn{color:var(--mint-dark);}
.ox-btn.x-btn{color:var(--red);}
.ox-btn.o-btn.selected{background:var(--mint);border-color:var(--mint);color:white;}
.ox-btn.x-btn.selected{background:var(--red);border-color:var(--red);color:white;}
.submit-btn{width:100%;padding:18px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--mint),var(--mint-dark));color:white;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(78,205,196,0.35);margin-top:20px;}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
.memo-area{width:100%;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Noto Sans JP',sans-serif;font-size:16px;resize:vertical;min-height:72px;outline:none;color:var(--gray-700);}
.memo-area:focus{border-color:var(--mint);}
.db-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.db-search{flex:1;min-width:140px;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Noto Sans JP',sans-serif;font-size:16px;outline:none;}
.db-search:focus{border-color:var(--mint);}
.db-filter{padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Noto Sans JP',sans-serif;font-size:16px;background:white;cursor:pointer;outline:none;color:var(--gray-700);}
.table-wrap{overflow-x:auto;}
.records-table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
.records-table th{background:var(--gray-50);padding:10px 12px;text-align:left;color:var(--gray-500);font-weight:600;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-family:'DM Sans',sans-serif;border-bottom:1px solid var(--gray-200);white-space:nowrap;}
.records-table td{padding:10px 12px;border-bottom:1px solid var(--gray-100);color:var(--gray-700);vertical-align:middle;}
.records-table tr:hover td{background:var(--mint-pale);}
.badge{display:inline-block;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:700;}
.badge-ok{background:rgba(78,205,196,0.12);color:var(--mint-dark);}
.badge-ng{background:rgba(255,107,107,0.12);color:var(--red);}
.row-actions{display:flex;gap:6px;}
.act-btn{padding:5px 10px;border-radius:var(--radius-xs);border:1.5px solid var(--gray-200);background:white;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray-500);font-family:'DM Sans',sans-serif;}
.act-btn:hover{border-color:var(--mint);color:var(--mint-dark);}
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-400);font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4;}
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.tag-item{display:flex;align-items:center;gap:6px;background:var(--gray-50);border:1.5px solid var(--gray-200);padding:6px 10px;border-radius:var(--radius-xs);font-size:13px;color:var(--gray-700);}
.tag-del{cursor:pointer;color:var(--gray-400);font-size:16px;line-height:1;}
.tag-del:hover{color:var(--red);}
.add-row{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.add-input{width:100%;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Noto Sans JP',sans-serif;font-size:16px;outline:none;}
.add-input:focus{border-color:var(--mint);}
.add-btn{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--mint);color:white;font-weight:700;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal{background:white;border-radius:var(--radius);padding:24px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;}
.modal-row{margin-bottom:12px;}
.modal-label{font-size:12px;color:var(--gray-500);font-weight:600;margin-bottom:4px;display:block;}
.modal-input{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Noto Sans JP',sans-serif;font-size:16px;outline:none;}
.modal-input:focus{border-color:var(--mint);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.modal-cancel{padding:10px 20px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:white;cursor:pointer;font-size:14px;font-weight:600;color:var(--gray-600);font-family:'DM Sans',sans-serif;}
.modal-save{padding:10px 24px;border:none;border-radius:var(--radius-sm);background:var(--mint);color:white;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;}
.detail-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px;}
.detail-item:last-child{border-bottom:none;}
.detail-name{color:var(--gray-600);}
.detail-val{font-weight:600;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gray-900);color:white;padding:12px 24px;border-radius:100px;font-size:14px;font-weight:500;z-index:200;transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.big{width:72vw;border-radius:var(--radius);padding:24px 16px;text-align:center;font-size:clamp(20px,5vw,32px);font-weight:800;background:linear-gradient(135deg,var(--mint-dark),var(--mint));top:50%;bottom:auto;white-space:normal;transform:translateX(-50%) translateY(-50%) scale(0.85);opacity:0;}
.toast.big.show{transform:translateX(-50%) translateY(-50%) scale(1);opacity:1;}
.hal-status{font-family:'Space Mono',monospace;font-size:11px;color:var(--gray-400);text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--gray-100);}
@media(max-width:600px){.card{padding:16px;}.btn-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

<div class="app">

  <!-- HEADER -->

      </div>
    </div>
  </div>

  <!-- TABS -->

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('input',this)">✏️ 点検入力</button>

    <button class="tab-btn" onclick="showTab('settings',this)">⚙️ 設定</button>

  <!-- INPUT PANEL -->

      <div class="step-item" id="step2"><div class="step-circle">2</div><span>車両</span></div>

</div>

<div id="stepPanel3" style="display:none">

      <div>
        <div style="font-size:11px;color:var(--gray-400);font-family:'Space Mono',monospace;margin-bottom:4px">INSPECTOR / VEHICLE</div>
        <div style="font-size:16px;font-weight:700" id="selectedSummary">—</div>
      </div>
      <button class="bulk-btn white" onclick="gotoStep(1)">← 最初から</button>
    </div>
  </div>

  <div class="card">

      <button class="bulk-btn" onclick="setAll('')">↺ リセット</button>

    <div class="inspection-grid" id="inspectionGrid"></div>

  <!-- DB PANEL -->

  <div class="panel" id="panel-db">
    <div class="card">

          <option value="ng">× あり</option>

        <table class="records-table">
          <thead><tr><th>日付</th><th>担当者</th><th>車両</th><th>アルコール</th><th>点検結果</th><th>操作</th></tr></thead>
          <tbody id="dbTableBody"></tbody>
        </table>
      </div>

    </div>

  <!-- SETTINGS PANEL -->

  <div class="panel" id="panel-settings">
    <div class="card">
      <div class="card-title">メンバー管理</div>
      <div class="tag-list" id="memberTags"></div>
      <div class="add-row">
        <input class="add-input" id="newMemberInput" placeholder="メンバー名を入力" maxlength="20">
        <button class="add-btn" onclick="addMember()">追加</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">車両管理</div>
      <div class="tag-list" id="vehicleTags"></div>
      <div class="add-row">
        <input class="add-input" id="newVehicleInput" placeholder="車両名・ナンバーを入力" maxlength="20">
        <button class="add-btn" onclick="addVehicle()">追加</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">点検項目管理</div>
      <div class="tag-list" id="checkItemTags"></div>
      <div class="add-row">
        <input class="add-input" id="newItemInput" placeholder="点検項目を入力" maxlength="30">
        <button class="add-btn" onclick="addCheckItem()">追加</button>
      </div>
    </div>
  </div>

  <div class="hal-status" id="halStatus">10-KEN // SYSTEM NOMINAL // ガガガ…（私は感情を持っていません）</div>

let cfg = JSON.parse(localStorage.getItem(CFG_KEY) || "null") || JSON.parse(JSON.stringify(DEFAULT_CFG));

function saveCfg() { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }

// ============================================================
// JSONBin
// ============================================================
async function getOrCreateBin() {
  const saved = localStorage.getItem(BIN_ID_KEY);
  if (saved) return saved;
  const res = await fetch(JSONBIN_BASE + "/b", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_API_KEY, "X-Bin-Name": "10ken-records", "X-Bin-Private": "false" },
    body: JSON.stringify({ records: [] })
  });
  if (!res.ok) throw new Error("Bin作成失敗: " + res.status);
  const data = await res.json();
  localStorage.setItem(BIN_ID_KEY, data.metadata.id);
  return data.metadata.id;
}

async function dbGet() {
  const id = await getOrCreateBin();
  const res = await fetch(JSONBIN_BASE + "/b/" + id + "/latest", { headers: { "X-Master-Key": JSONBIN_API_KEY } });
  if (!res.ok) throw new Error("取得失敗: " + res.status);
  const data = await res.json();
  return Array.isArray(data.record && data.record.records) ? data.record.records : [];
}

async function dbSet(recs) {
  const id = await getOrCreateBin();
  const res = await fetch(JSONBIN_BASE + "/b/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_API_KEY },
    body: JSON.stringify({ records: recs })
  });
  if (!res.ok) throw new Error("保存失敗: " + res.status);
}

// ============================================================
// Toast
// ============================================================
let toastTimer = null;
function showToast(msg, big) {
  const t = document.getElementById("toast");
  if (toastTimer) clearTimeout(toastTimer);
  t.className = "toast" + (big ? " big" : "");
  t.textContent = msg;
  void t.offsetWidth;
  t.classList.add("show");
  toastTimer = setTimeout(() => t.classList.remove("show"), big ? 3000 : 2800);
}

// ============================================================
// スクロール
// ============================================================
function scrollTo(id) {
  setTimeout(() => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 150);
}

// ============================================================
// Tab
// ============================================================
function showTab(tab, el) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("panel-" + tab).classList.add("active");
  if (el) el.classList.add("active");
  if (tab === "db") loadAndRender();
  if (tab === "settings") renderSettings();
}

// ============================================================
// Steps
// ============================================================
function gotoStep(n) {
  [1, 2, 3].forEach(i => {
    document.getElementById("stepPanel" + i).style.display = i === n ? "block" : "none";
    const el = document.getElementById("step" + i);
    el.className = "step-item" + (i < n ? " done" : i === n ? " active" : "");
    el.querySelector(".step-circle").textContent = i < n ? "✓" : i;
    if (i < 3) document.getElementById("line" + i).className = "step-line" + (i < n ? " done" : "");
  });
}

// Member / Vehicle
// ============================================================
function renderMemberGrid() {
  document.getElementById("memberGrid").innerHTML = cfg.members.map((m, i) =>
    `<button class="sel-btn${selMember===m?" selected":""}" onclick="selectMember(${i})">👤 ${m}</button>`
  ).join("");
}

function renderVehicleGrid() {

function selectMember(i) {

}

// ============================================================
function renderInspectionGrid() {
  inspection = {}; alcResult = null;

  document.getElementById("alcFail").classList.remove("selected");
  document.getElementById("alcoholValue").value = "0.00";
  document.getElementById("memoField").value = "";

    `<div class="inspect-row" id="row${i}">

        <button class="ox-btn o-btn" id="o${i}" onclick="setInspect(${i},'o')">○</button>
        <button class="ox-btn x-btn" id="x${i}" onclick="setInspect(${i},'x')">×</button>
      </div>
    </div>`
  ).join("");
}

function setInspect(i, val) {
  inspection[i] = val;
  document.getElementById("o" + i).className = "ox-btn o-btn" + (val === "o" ? " selected" : "");
  document.getElementById("x" + i).className = "ox-btn x-btn" + (val === "x" ? " selected" : "");
  document.getElementById("row" + i).className = "inspect-row" + (val === "o" ? " ok" : " ng");
}

function setAlcResult(r) {
  alcResult = r;
  document.getElementById("alcPass").className = "alc-result-btn pass" + (r === "pass" ? " selected" : "");
  document.getElementById("alcFail").className = "alc-result-btn fail" + (r === "fail" ? " selected" : "");
  scrollTo("bulkActions");
}

function setAll(val) {
  cfg.checkItems.forEach((_, i) => { if (val) setInspect(i, val); else { inspection[i] = ""; document.getElementById("o"+i).className="ox-btn o-btn"; document.getElementById("x"+i).className="ox-btn x-btn"; document.getElementById("row"+i).className="inspect-row"; } });
  if (val) scrollTo("submitBtn");

// ============================================================
// Submit
// ============================================================
async function submitRecord() {
  if (!selMember || !selVehicle) { showToast("担当者と車両を選択してください"); return; }
  if (!alcResult) { showToast("アルコール検査結果を選択してください"); return; }
  const unanswered = cfg.checkItems.filter((_, i) => !inspection[i]);
  if (unanswered.length > 0) { showToast("未入力の項目が " + unanswered.length + " つあります"); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "⏳ 保存中…";

  const now = new Date();
  const record = {
    id: Date.now().toString(),
    date: now.toISOString().slice(0, 10),
    time: now.toTimeString().slice(0, 5),
    member: selMember, vehicle: selVehicle,
    alcoholValue: document.getElementById("alcoholValue").value,
    alcoholResult: alcResult,
    items: cfg.checkItems.map((name, i) => ({ name, val: inspection[i] })),
    memo: document.getElementById("memoField").value,
    createdAt: now.toISOString()
  };

  try {
    let latest = [];
    try { latest = await dbGet(); } catch {}
    await dbSet([record, ...latest]);
    records = [record, ...latest];
    showToast("✅ 入力完了", true);
    document.getElementById("halStatus").textContent = "10-KEN // 記録保存完了 // （うれし…いえ処理完了です）";
    selMember = null; selVehicle = null; alcResult = null; inspection = {};
    gotoStep(1); renderMemberGrid();
  } catch(e) {
    showToast("❌ 保存失敗: " + e.message);
  }
  btn.disabled = false; btn.textContent = "📋 入力";
}

}

function renderDB() {
  const search = (document.getElementById("dbSearch").value || "").toLowerCase();
  const filter = document.getElementById("dbFilter").value;
  let data = records.filter(r => {
    if (search && !r.member.toLowerCase().includes(search) && !r.vehicle.toLowerCase().includes(search)) return false;
    if (filter === "ok") return r.items.every(it => it.val === "o") && r.alcoholResult === "pass";
    if (filter === "ng") return r.items.some(it => it.val === "x") || r.alcoholResult === "fail";
    return true;
  });

  document.getElementById("dbEmpty").style.display = data.length === 0 ? "block" : "none";
  document.getElementById("dbStats").textContent = data.length > 0 ? "表示: " + data.length + " 件 / 総計: " + records.length + " 件" : "";
  document.getElementById("dbTableBody").innerHTML = data.map(r => {
    const hasNG = r.items.some(it => it.val === "x") || r.alcoholResult === "fail";
    return `<tr>
      <td><span style="font-family:'Space Mono',monospace;font-size:12px">${r.date}</span><br><span style="font-size:11px;color:var(--gray-400)">${r.time}</span></td>
      <td><strong>${r.member}</strong></td>
      <td>${r.vehicle}</td>
      <td><span class="badge badge-${r.alcoholResult==="pass"?"ok":"ng"}">${r.alcoholResult==="pass"?"合格 "+r.alcoholValue+"mg/L":"不合格"}</span></td>
      <td><span class="badge badge-${hasNG?"ng":"ok"}">${hasNG?"× あり":"全て ○"}</span></td>
      <td><div class="row-actions">
        <button class="act-btn" onclick="viewRecord('${r.id}')">詳細</button>
        <button class="act-btn" onclick="editRecord('${r.id}')">編集</button>
      </div></td>
    </tr>`;
  }).join("");
}

document.getElementById(“modalOverlay”).style.display = “flex”;

async function saveModal() {
const r = records.find(x => x.id === editingId); if (!r) return;
r.member = document.getElementById(“eMember”).value;
r.vehicle = document.getElementById(“eVehicle”).value;
r.alcoholValue = document.getElementById(“eAlcVal”).value;
r.alcoholResult = document.getElementById(“eAlcRes”).value;
r.items = r.items.map((it, i) => ({ …it, val: document.getElementById(“eItem” + i).value }));
r.memo = document.getElementById(“eMemo”).value;
try { await dbSet(records); showToast(“✅ 更新しました”); renderDB(); closeModal(); }
catch(e) { showToast(“❌ 更新失敗: “ + e.message); }
}

function exportCSV() {
if (!records.length) { showToast(“データがありません”); return; }
const h = [“日付”,“時刻”,“担当者”,“車両”,“アルコール(mg/L)”,“アルコール結果”,…records[0].items.map(it=>it.name),“備考”];
const rows = records.map(r => [r.date,r.time,r.member,r.vehicle,r.alcoholValue||””,r.alcoholResult===“pass”?“合格”:“不合格”,…r.items.map(it=>it.val===“o”?“○”:“×”),r.memo||””]);
const csv = [h,…rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(”,”)).join(”\n”);
const a = document.createElement(“a”);
a.href = URL.createObjectURL(new Blob([”\uFEFF”+csv],{type:“text/csv;charset=utf-8”}));
a.download = “点検記録_” + new Date().toISOString().slice(0,10) + “.csv”;
a.click(); showToast(“📊 CSVを出力しました”);
}
