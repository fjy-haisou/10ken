<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

// ============================================================

const JSONBIN_API_KEY=”$2a$10$fFN6xCw18tGc56ae.WbDPe6joMUd4ADi4RXXnZ0DkfBxxZ6NozbOG”;
const ANTHROPIC_API_KEY=””; // ← 取得後ここに入力
// ============================================================

const CFG_KEY=“hal9001_cfg”,BIN_ID_KEY=“hal9001_binid”,JOKE_KEY=“hal9001_joke”;
const JSONBIN_BASE=“https://api.jsonbin.io/v3”;
const DEFAULT_CFG={
members:[“堺　昭”,“牛田　恭平”,“戸田　愛”,“村井　貴文”],
vehicles:[“ふそう　2000”,“ふそう　2500”,“ふそう　3500”,“AD-VAN”,“キャラバン”,“バネット”],
checkItems:[“ヘッドライト”,“ブレーキランプ”,“ウインカー”,“空気圧”,“亀裂・損傷”,“溝の深さ”,“エンジンオイル”,“冷却水”,“ウォッシャー液”,“ボディの損傷・汚れ”,“窓・ミラーの清潔”,“シートベルト”,“クラクション”,“ワイパー”,“サイドブレーキ”,“ブレーキペダルの遊び”]
};

async function getOrCreateBin(){
const s=localStorage.getItem(BIN_ID_KEY);if(s)return s;
const r=await fetch(`${JSONBIN_BASE}/b`,{method:“POST”,headers:{“Content-Type”:“application/json”,“X-Master-Key”:JSONBIN_API_KEY,“X-Bin-Name”:“10ken-records”,“X-Bin-Private”:“false”},body:JSON.stringify({records:[]})});
if(!r.ok)throw new Error(“Bin作成失敗:”+r.status);
const d=await r.json();localStorage.setItem(BIN_ID_KEY,d.metadata.id);return d.metadata.id;
}
async function dbGet(){
const id=await getOrCreateBin();
const r=await fetch(`${JSONBIN_BASE}/b/${id}/latest`,{headers:{“X-Master-Key”:JSONBIN_API_KEY}});
if(!r.ok)throw new Error(“取得失敗:”+r.status);
const d=await r.json();return Array.isArray(d.record?.records)?d.record.records:[];
}
async function dbSet(records){
const id=await getOrCreateBin();
const r=await fetch(`${JSONBIN_BASE}/b/${id}`,{method:“PUT”,headers:{“Content-Type”:“application/json”,“X-Master-Key”:JSONBIN_API_KEY},body:JSON.stringify({records})});
if(!r.ok)throw new Error(“保存失敗:”+r.status);
}

function wttrCode(c){const m={113:0,116:1,119:3,122:3,143:45,176:80,179:77,182:67,200:95,263:51,266:53,293:61,296:63,299:65,302:65,305:65,353:80,356:82,386:95,389:99};return m[c]??3;}
function wmoEmoji(c){if(c===0)return”☀️”;if(c<=2)return”🌤️”;if(c===3)return”☁️”;if(c<=49)return”🌫️”;if(c<=67)return”🌧️”;if(c<=77)return”🌨️”;if(c<=82)return”🌦️”;if(c<=99)return”⛈️”;return”🌡️”;}
function wmoJa(c){if(c===0)return”快晴”;if(c<=2)return”晴れ時々曇り”;if(c===3)return”曇り”;if(c<=49)return”霧”;if(c<=67)return”雨”;if(c<=77)return”雪”;if(c<=82)return”にわか雨”;if(c<=99)return”雷雨”;return”不明”;}

function useToast(){
const[toast,setToast]=useState({msg:””,big:false,show:false});
const t=useRef(null);
const show=useCallback((msg,big=false)=>{
if(t.current)clearTimeout(t.current);
setToast({msg,big,show:true});
t.current=setTimeout(()=>setToast(x=>({…x,show:false})),big?3000:2800);
},[]);
return[toast,show];
}

function App(){
const[tab,setTab]=useState(“input”);
const[step,setStep]=useState(1);

const[cfg,setCfgRaw]=useState(()=>{try{const s=JSON.parse(localStorage.getItem(CFG_KEY)||“null”);return s||JSON.parse(JSON.stringify(DEFAULT_CFG));}catch{return JSON.parse(JSON.stringify(DEFAULT_CFG));}});
const[selMember,setSelMember]=useState(null);
const[selVehicle,setSelVehicle]=useState(null);
const[alcValue,setAlcValue]=useState(“0.00”);
const[alcResult,setAlcResult]=useState(null);
const[inspection,setInspection]=useState({});
const[memo,setMemo]=useState(””);
const[submitting,setSubmitting]=useState(false);
const[dbSearch,setDbSearch]=useState(””);
const[dbFilter,setDbFilter]=useState(””);
const[modal,setModal]=useState(null);
const[editData,setEditData]=useState(null);
const[halMsg,setHalMsg]=useState(“SYSTEM NOMINAL // ガガガ…（私は感情を持っていません）”);
const[joke,setJoke]=useState(“ジョーク生成中…”);
const[weather,setWeather]=useState({icon:“⏳”,temp:”–°C”,desc:“取得中…”});
const[dateStr,setDateStr]=useState(””);
const[dayStr,setDayStr]=useState(””);
const[newMember,setNewMember]=useState(””);
const[newVehicle,setNewVehicle]=useState(””);
const[newItem,setNewItem]=useState(””);
const[toast,showToast]=useToast();
